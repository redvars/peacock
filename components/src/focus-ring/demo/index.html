<!doctype html>
<html lang='en-GB'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0, viewport-fit=cover' />
  <link rel='stylesheet' href='/dist/assets/styles/tokens.css' />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    body {
      background: #fafafa;
      padding: 40px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: center;
      font-family: 'Noto Sans', sans-serif;
    }

    .focus-surface {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 8px;
      background: #e0e0e0;
      cursor: pointer;
      border: none;
      font: inherit;
    }
  </style>
</head>
<body>

  <button class="focus-surface">
    Outward (default)
    <p-focus-ring></p-focus-ring>
  </button>

  <button class="focus-surface">
    Inward
    <p-focus-ring inward></p-focus-ring>
  </button>

<script type='module'>
  import { FocusRing } from '/dist/index.js';
  window.customElements.define('p-focus-ring', FocusRing);
</script>
</body>
</html>
